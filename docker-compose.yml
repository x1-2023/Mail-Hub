version: '3.8'

services:
  # 1. Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: always
    privileged: true
    env_file:
      - .env
    environment:
      - PORT=8080 # Internal container port
    ports:
      - "${API_PORT:-8080}:8080"
      - "${SMTP_PORT:-2525}:2525"
    networks:
      - awf-mail-network

  # 4. Frontend (Nginx)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # Pass the Public API URL for build time bake-in
        # In Prod with Nginx Proxy Manager, this might just be /api if same domain,
        # or https://api.yourdomain.com
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8080/api}
    restart: always
    ports:
      - "${WEB_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - awf-mail-network

networks:
  awf-mail-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
