version: '3.8'

services:
  # 1. Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: always
    network_mode: "host"
    env_file:
      - .env
    environment:
      # In Host Mode, app binds directly to host port.
      # User wants API on 3000, so we tell backend to listen on 3000.
      - PORT=${API_PORT:-3000}
      - SMTP_PORT=${SMTP_PORT:-25}

  # 4. Frontend (Nginx)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # Pass the Public API URL for build time bake-in
        # In Prod with Nginx Proxy Manager, this might just be /api if same domain,
        # or https://api.yourdomain.com
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8080/api}
    restart: always
    network_mode: "host"
    environment:
       # Tell Nginx to listen on this port directly
      - PORT=${WEB_PORT:-4000}
    depends_on:
      - backend

# No networks needed for host mode
volumes:
  postgres_data:
  redis_data:
